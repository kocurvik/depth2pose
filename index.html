<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- TODO: Meta Tags -->

	<!-- Favicon and App Icons -->
	<link rel="icon" type="image/x-icon" href="static/images/vrg.png">
	<link rel="apple-touch-icon" href="static/images/vrg.png">

	<!-- Critical CSS - Load synchronously -->
	<link rel="stylesheet" href="static/css/bulma.min.css">
	<link rel="stylesheet" href="static/css/primeicons.css">
	<link rel="stylesheet" href="static/css/index.css">
	<link rel="stylesheet" href="static/css/benchmark.css">

	<!-- Fonts - Optimized loading -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

	<!-- Main JavaScript -->
	<script type="module">
		import { applyStaticTexts } from "./static/js/dictionary/index.js";
		import { initResultsTable } from "./static/js/results-table.js";
		import { initImageExamples } from "./static/js/img-examples/index.js";

		applyStaticTexts();
		initResultsTable();
		initImageExamples();
	</script>

	<title data-i18n="hero.title"></title>
</head>
<body>

	<!-- Hero Section -->
	<section class="hero benchmark-hero">
		<div class="hero-body benchmark-hero-body">
			<div class="container benchmark-hero-container is-max-desktop has-text-centered">
				<h1 class="title is-2 publication-title" data-i18n="hero.title"></h1>
				<p class="subtitle is-5 mb-3" data-i18n="hero.subtitle"></p>
				<div class="author-row" data-i18n="hero.tags"/>
			</div>
		</div>
	</section>

	<!-- Table Section -->
	<section class="section pb-0">
		<div class="container is-max-desktop">

			<!-- Controls -->
			<div class="controls-card" id="controlsCard">

				<!-- Toggle Button -->
				<button class="controls-toggle" type="button" id="controlsToggle" aria-expanded="true" aria-controls="controlsContent" data-i18n="controls.toggle.hide"></button>

				<!-- Controls Stack -->
				<div class="controls-stack" id="controlsContent">

					<!-- Controls for dataset, iterations, evaluation case, solver variant, search, page size -->
					<div class="top-controls-grid row-content">
						<div class="field mb-0">
							<label class="label" data-i18n="controls.label.benchmark"></label>
							<div class="select is-fullwidth">
								<select id="benchmarkModeSelect"></select>
							</div>
						</div>

						<div class="field mb-0">
							<label class="label" data-i18n="controls.label.source"></label>
							<div class="select is-fullwidth">
								<select id="sourceSelect"></select>
							</div>
						</div>

						<div class="field mb-0">
							<label class="label" id="datasetLabel" data-i18n="controls.label.dataset"></label>
							<div class="select is-fullwidth">
								<select id="datasetSelect"></select>
							</div>
						</div>

						<div class="field mb-0">
							<label class="label" data-i18n="controls.label.iters"></label>
							<div class="select is-fullwidth">
								<select id="itersSelect"></select>
							</div>
						</div>

						<div class="field mb-0">
							<label class="label" data-i18n="controls.label.evaluationCase"></label>
							<div class="select is-fullwidth">
								<select id="evaluationCaseSelect"></select>
							</div>
						</div>

						<div class="field mb-0">
							<label class="label" data-i18n="controls.label.solverVariant"></label>
							<div class="select is-fullwidth">
								<select id="solverVariantSelect"></select>
							</div>
						</div>

						<div class="field mb-0">
							<label class="label" data-i18n="controls.label.depthType"></label>
							<div class="select is-fullwidth">
								<select id="depthTypeSelect"></select>
							</div>
						</div>

						<div class="control-row-break"></div>

						<div class="field mb-0 field-wide">
							<label class="label" data-i18n="controls.label.search"></label>
							<input id="searchInput" class="input" type="text" data-i18n="controls.search.placeholder" data-i18n-attr="placeholder" />
						</div>

						<div class="field mb-0">
							<label class="label" data-i18n="controls.label.pageSize"></label>
							<div class="select is-fullwidth">
								<select id="pageSizeSelect">
									<option value="10">10</option>
									<option value="25" selected>25</option>
									<option value="50">50</option>
									<option value="100">100</option>
								</select>
							</div>
						</div>
					</div>

					<!-- Filters -->
					<div class="control-row">
						<div class="row-label" data-i18n="controls.label.filters"></div>
						<div class="row-content">
							<div class="inline-checkboxes">
								<label class="checkbox">
									<input type="checkbox" id="hideGtOnly" checked />
									<span data-i18n="controls.filter.hideGtOnly"></span>
								</label>

								<label class="checkbox">
									<input type="checkbox" id="bestMdeOnly" />
									<span data-i18n="controls.filter.bestMdeOnly"></span>
								</label>
							</div>
						</div>
					</div>

				</div>

			</div>

			<!-- Table -->
			<div class="table-card mt-5" id="tableCard">

				<!-- Toggle Button -->
				<button class="controls-toggle" type="button" id="tableToggle" aria-expanded="true" aria-controls="tableContent" data-i18n="table.toggle.hide"></button>

				<!-- Content Stack -->
				<div class="card-content-stack" id="tableContent">
					<div class="table-container">
						<table class="table is-striped is-hoverable benchmark-table">
							<thead class="benchmark-table-head" id="resultsHead"></thead>
							<tbody class="benchmark-table-body" id="resultsBody"></tbody>
						</table>
					</div>
					<div class="empty-box" id="emptyState" hidden></div>
					<div class="pagination-bar" id="paginationBar">
						<div class="pagination-info" id="paginationInfo"></div>
						<div class="pagination-actions">
							<button class="button is-light is-small" type="button" id="prevPageBtn" data-i18n="pagination.prev"></button>
							<button class="button is-light is-small" type="button" id="nextPageBtn" data-i18n="pagination.next"></button>
						</div>
					</div>
				</div>

			</div>

			<!-- Results -->
			<div class="controls-card mt-5" id="resultsCard">

				<!-- Toggle Button -->
				<button class="controls-toggle" type="button" id="resultsToggle" aria-expanded="true" aria-controls="resultsContent" data-i18n="results.toggle.hide"></button>

				<!-- Content Stack -->
				<div class="card-content-stack" id="resultsContent">
					<h2 class="title is-4 mb-1" data-i18n="results.title"></h2>
					<p class="muted-note" data-i18n="results.note"></p>
					<div class="summary-grid" id="summaryGrid"></div>
				</div>

			</div>

		</div>
	</section>

	<!-- Image Examples Section -->
	<section class="section pb-8 pt-2">
		<div class="container is-max-desktop">
			<div class="controls-card mt-5 benchmark-examples-card" id="benchmarkExamplesCard">
				
				<!-- Examples Toggle Button -->
				<button class="controls-toggle" type="button" id="examplesToggle" aria-expanded="true" aria-controls="examplesContent" data-i18n="examples.toggle.hide"></button>

				<!-- Examples Content Stack -->
				<div class="card-content-stack" id="examplesContent">
					<div class="benchmark-examples-header">
						<div>
							<h2 class="title is-4 mb-1" id="benchmarkExamplesTitle" data-i18n="examples.title"></h2>
							<p class="muted-note mb-0" id="benchmarkExamplesSubtitle" data-i18n="examples.subtitle.choose-dataset"></p>
						</div>

						<button class="benchmark-examples-back" type="button" id="benchmarkExamplesBack" hidden>
							<span aria-hidden="true">←</span>
							<span data-i18n="examples.back"></span>
						</button>
					</div>

					<div class="benchmark-examples-scroll" id="benchmarkExamplesContent">
						<div class="example-loading" data-i18n="examples.loading.datasets"></div>
					</div>
				</div>

			</div>
		</div>
	</section>

</body>
</html>
